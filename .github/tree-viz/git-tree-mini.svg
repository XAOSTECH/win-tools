<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="300" height="450"
     viewBox="460 40 400 600">
  <style>
    @keyframes sway {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(3px); }
      50%  { transform: translateX(-2px); }
      75%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .mini-node { animation: sway 4s ease-in-out infinite; }
    .mini-line { stroke-width: 1.5; fill: none; opacity: 0.5; }
  </style>
  <rect width="100%" height="100%" fill="#0a0a1a" rx="6"/>
  <g class="mini-node">
    <line class="mini-line" stroke="#4ade80" x1="600" y1="60" x2="600" y2="100"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="100" x2="600" y2="140"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="140" x2="600" y2="260"/>
    <path class="mini-line" stroke="#64748b" d="M 600 140 C 600 156, 720 164, 720 180"/>
    <path class="mini-line" stroke="#64748b" d="M 720 180 C 720 212, 600 228, 600 260"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="260" x2="600" y2="300"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="300" x2="600" y2="340"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="340" x2="600" y2="380"/>
    <path class="mini-line" stroke="#64748b" d="M 600 340 C 600 372, 480 388, 480 420"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="380" x2="600" y2="500"/>
    <path class="mini-line" stroke="#64748b" d="M 480 420 C 480 452, 600 468, 600 500"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="500" x2="600" y2="620"/>
