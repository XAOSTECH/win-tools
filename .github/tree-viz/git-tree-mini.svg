    <path class="mini-line" stroke="#64748b" d="M 600 100 C 600 116, 720 124, 720 140"/>
    <path class="mini-line" stroke="#64748b" d="M 720 140 C 720 172, 600 188, 600 220"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="220" x2="600" y2="260"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="260" x2="600" y2="300"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="300" x2="600" y2="340"/>
    <path class="mini-line" stroke="#64748b" d="M 600 300 C 600 332, 480 348, 480 380"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="340" x2="600" y2="460"/>
