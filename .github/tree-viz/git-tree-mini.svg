    <circle cx="600" cy="60" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="100" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="140" r="7" fill="#c084fc" opacity="0.9"/>
    <circle cx="720" cy="180" r="4" fill="#4ade80" opacity="0.9"/>
