<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="300" height="390"
     viewBox="460 40 400 520">
  <style>
    @keyframes sway {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(3px); }
      50%  { transform: translateX(-2px); }
      75%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .mini-node { animation: sway 4s ease-in-out infinite; }
    .mini-line { stroke-width: 1.5; fill: none; opacity: 0.5; }
  </style>
  <rect width="100%" height="100%" fill="#0a0a1a" rx="6"/>
  <g class="mini-node">
    <line class="mini-line" stroke="#4ade80" x1="600" y1="60" x2="600" y2="180"/>
    <path class="mini-line" stroke="#64748b" d="M 600 60 C 600 76, 720 84, 720 100"/>
    <path class="mini-line" stroke="#64748b" d="M 720 100 C 720 132, 600 148, 600 180"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="180" x2="600" y2="220"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="220" x2="600" y2="260"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="260" x2="600" y2="300"/>
    <path class="mini-line" stroke="#64748b" d="M 600 260 C 600 292, 480 308, 480 340"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="300" x2="600" y2="420"/>
    <path class="mini-line" stroke="#64748b" d="M 480 340 C 480 372, 600 388, 600 420"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="420" x2="600" y2="540"/>
    <path class="mini-line" stroke="#64748b" d="M 840 460 C 840 492, 600 508, 600 540"/>
    <circle cx="600" cy="60" r="7" fill="#c084fc" opacity="0.9"/>
    <circle cx="720" cy="100" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="180" r="6" fill="#fb923c" opacity="0.9"/>
    <circle cx="600" cy="220" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="260" r="7" fill="#c084fc" opacity="0.9"/>
    <circle cx="600" cy="300" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="480" cy="340" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="420" r="6" fill="#fb923c" opacity="0.9"/>
    <circle cx="840" cy="460" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="540" r="6" fill="#fb923c" opacity="0.9"/>
  </g>
