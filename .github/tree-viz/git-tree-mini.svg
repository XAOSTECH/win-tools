    <circle cx="720" cy="140" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="220" r="6" fill="#fb923c" opacity="0.9"/>
    <circle cx="600" cy="260" r="4" fill="#4ade80" opacity="0.9"/>
